##
# Builds SSI agent from github.com/impierce/ssi-agent beta branch
# and pushes it to cr.surf.nl/edubadges-educredentials/ssi-agent:develop-local
#
# - Uses our own Dockerfile so we copy in config files
# - Copies edubadges-config from the current repo as config file for
#   the configuration that we cannot provide through ENV vars
#
# Required secrets:
#   - CR_SURF_USERNAME: Username for cr.surf.nl registry
#   - CR_SURF_PASSWORD: Password for cr.surf.nl registry
#

name: Build SSI Agent container

on:
  push:
    branches: [main]
    tags: ["*"]

jobs:
  build-ssi-agent-local:
    name: "Build SSI Agent"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Copy Dockerfile into ssi-agent-source
        run: |
          cp Dockerfile ssi-agent-source/Dockerfile

      - name: Copy config into ssi-agent-source
        run: |
          cp config.yaml ssi-agent-source/config.yaml

      - name: Log in to SDP Container Registry "Harbor"
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          registry: cr.surf.nl
          username: ${{ secrets.CR_SURF_USERNAME }}
          password: ${{ secrets.CR_SURF_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Strip v prefix if present for semver
            TAG=${{ github.ref_name }}
            TAG=${TAG#v}
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ssi-agent-source
          file: Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            cr.surf.nl/edubadges-educredentials/ssi-agent:${{ steps.tag.outputs.tag }}
            cr.surf.nl/edubadges-educredentials/ssi-agent:latest
